{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Online Admission Form - Sarvodaya Institute of Graduate Studies (SIGS), Tumkur">

    <title>Admission Form | SIGS</title>

    <link rel="icon" href="{% static 'assets/images/logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <script defer src="{% static 'assets/js/admission.js' %}?v=1.1"></script>
</head>

<body>

<header class="navbar">
    <div class="container nav-container">
        <a href="{% url 'index' %}" class="brand">
            <img src="{% static 'assets/images/logo.png' %}" alt="SIGS Logo">
            <span>SIGS</span>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="{% url 'index' %}">Home</a></li>
                <li><a href="{% url 'faculty' %}">Faculty</a></li>
                <li><a href="{% url 'index' %}#contact">Contact</a></li>
            </ul>
            <button class="menu-toggle">☰</button>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">
        <h1 class="section-title">College Admission Form 2026-27</h1>

        <form class="admission-form" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

            <!-- Personal Information -->
            <h2>Personal Information</h2>

            <div class="form-grid">

                <div>
                    <label>Full Name *</label>
                    <input type="text" name="fullname" required>
                </div>

                <div>
                    <label>Date of Birth *</label>
                    <input type="date" name="dob" required>
                </div>

                <div>
                    <label>Gender *</label>
                    <select name="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div>
                    <label>Phone Number *</label>
                    <input type="tel" name="phone" required>
                </div>

                <div>
                    <label>Email Address *</label>
                    <input type="email" name="email" required>
                </div>

                <div>
                    <label>Aadhar Number *</label>
                    <input type="text" name="aadhar" required>
                </div>

            </div>

            <!-- Address -->
            <h2>Address Details</h2>

            <div class="form-grid">
                <div>
                    <label>Permanent Address *</label>
                    <textarea name="address" rows="3" required></textarea>
                </div>

                <div>
                    <label>City *</label>
                    <input type="text" name="city" required>
                </div>

                <div>
                    <label>State *</label>
                    <input type="text" name="state" required>
                </div>

                <div>
                    <label>Pincode *</label>
                    <input type="text" name="pincode" required>
                </div>
            </div>

            <!-- Academic Details -->
            <h2>Academic Information</h2>

            <div class="form-grid">

                <div>
                    <label>12th Board *</label>
                    <input type="text" name="board" required>
                </div>

                <div>
                    <label>12th Percentage *</label>
                    <input type="number" step="0.01" name="percentage" required>
                </div>

                <div>
                    <label>Year of Passing *</label>
                    <input type="number" name="passing_year" required>
                </div>

                <div>
                    <label>Course Applying For *</label>
                    <select name="course" required>
                        <option value="">Select Course</option>
                        <option>BCA</option>
                        <option>BCA AI/ML</option>
                        <option>B.Com</option>
                    </select>
                </div>

            </div>

            <!-- Documents -->
            <h2>Upload Documents</h2>

            <div class="form-grid">
                <div>
                    <label>Upload 12th Marksheet *</label>
                    <input type="file" name="marksheet_12th" required>
                </div>

                <div>
                    <label>Upload ID Proof *</label>
                    <input type="file" name="id_proof" required>
                </div>

                <div>
                    <label>Passport Size Photo *</label>
                    <input type="file" name="passport_photo" required>
                </div>
            </div>

            <div style="margin-top:30px;">
                <button type="submit" class="btn-primary">Submit Application</button>
            </div>

        </form>
    </div>
</section>

<footer class="footer">
    <div class="footer-bottom">
        <p>© 2026 Sarvodaya Institute of Graduate Studies | All Rights Reserved</p>
    </div>
</footer>

</body>
</html>
